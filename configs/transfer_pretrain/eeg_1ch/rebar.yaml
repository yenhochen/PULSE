base_config: configs/base/transfer_pretrain_base.yaml
model_type: rebar

data_args:
  path: data/sleep_eeg/processed/healthy
  mode: fullts
  input_dims: 1
  subseq_size: 200
  train_stride: 200
  val_stride: 200
  include_channels: [0]
  p_train: 0.1
  p_val: 0.1

model_args:
  candidateset_size: 10
  tau: 1
  alpha: 0.5
  double_receptivefield: 5
  mask_extended: 100
  rebarcrossattn_batch_size: 32
  rebarcrossattn_epochs: 100
  rebarcrossattn_save_epochfreq: 100
  rebarcrossattn_retrain: false

training_args:
  epochs: 100
  batch_size: 64
  eval_batch_size: 64
  lr: 0.0001
  save_every_n: 100
