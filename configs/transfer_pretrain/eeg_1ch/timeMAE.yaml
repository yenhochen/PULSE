base_config: configs/base/transfer_pretrain_base.yaml
model_type: timeMAE

data_args:
  path: data/sleep_eeg/processed/healthy
  mode: fullts
  input_dims: 1
  subseq_size: 200
  train_stride: 200
  val_stride: 200
  include_channels: [0]
  p_train: 0.1
  p_val: 0.1

model_args:
  d_model: 128
  dropout: 0.2
  attn_heads: 4
  layers: 8
  alpha: 5.0
  beta: 1.0
  enable_res_parameter: 1
  eval_per_steps: 16

  momentum: 0.99
  vocab_size: 256
  wave_length: 8
  mask_ratio: 0.6
  reg_layers: 4

training_args:
  epochs: 100
  batch_size: 64
  eval_batch_size: 64
  lr: 0.0001
  save_every_n: 100
