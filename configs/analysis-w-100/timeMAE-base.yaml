base_config: configs/base/base.yaml
model_type: timeMAE

data_args:
  path: null
  analysis_args:
    n_classes: 5
  mode: fullts
  input_dims: 3
  subseq_size: 100
  train_stride: 100
  val_stride: 100

model_args:
  d_model: 128
  dropout: 0.2
  attn_heads: 4
  layers: 8
  alpha: 5.0
  beta: 1.0
  enable_res_parameter: 1
  eval_per_steps: 16

  momentum: 0.99
  vocab_size: 256
  wave_length: 10
  mask_ratio: 0.6
  reg_layers: 4

training_args:
  epochs: 100
  batch_size: 128
  eval_batch_size: 128
  lr: 0.001
  save_every_n: 100
