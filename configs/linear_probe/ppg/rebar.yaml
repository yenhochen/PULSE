base_config: configs/base/base.yaml
model_type: rebar

data_args:
  path: data/ppg/processed
  mode: fullts
  input_dims: 1
  subseq_size: 960
  downsample_factor: 4

model_args:
  candidateset_size: 10
  tau: 1
  alpha: 1
  double_receptivefield: 5
  mask_extended: 300
  rebarcrossattn_batch_size: 32
  rebarcrossattn_epochs: 500
  rebarcrossattn_save_epochfreq: 500
  rebarcrossattn_retrain: false

training_args:
  epochs: 100
  batch_size: 64
  eval_batch_size: 64
  lr: 0.001
  save_every_n: 100
