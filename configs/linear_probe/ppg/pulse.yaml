# PULSE linear-probe — PPG (1-channel photoplethysmography)
base_config: configs/base/pulse_base.yaml

data_args:
  path: data/ppg/processed
  input_dims: 1
  subseq_size: 960
  train_stride: 500
  val_stride: 480
  downsample_factor: 4

model_args:
  recon_args:
    num_layers: 4
  init_args:
    in_proj_kernel_size: 5
    in_proj_dilation: 2

training_args:
  lr: 0.0001
  batch_size: 128
  eval_batch_size: 128
  save_every_n: 100
