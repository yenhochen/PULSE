base_config: configs/base/base.yaml
model_type: rebar

data_args:
  path: data/har/processed
  mode: fullts
  input_dims: 6
  subseq_size: 128
  train_stride: 128
  val_stride: 128

model_args:
  candidateset_size: 10
  tau: 1
  alpha: 0
  double_receptivefield: 1
  mask_extended: 15
  rebarcrossattn_batch_size: 32
  rebarcrossattn_epochs: 300
  rebarcrossattn_save_epochfreq: 300
  rebarcrossattn_retrain: false

training_args:
  epochs: 100
  batch_size: 64
  eval_batch_size: 64
  lr: 0.001
  save_every_n: 100
